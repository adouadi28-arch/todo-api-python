name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=html --cov-fail-under=70
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: |
          pip install --upgrade pip wheel
          pip install bandit pip-audit -r requirements.txt
      - name: SAST scan with bandit
        run: bandit -r . -x ./tests --format json --output bandit-report.json || true
      - name: Dependency audit
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln CVE-2026-24049 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln CVE-2026-48818 \
            --ignore-vuln CVE-2026-48817
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}

  update-gitops:
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: adouadi28-arch/gitops-team-Ryuk
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Update image tag in Kustomize base
        run: |
          sed -i "s|image: ghcr.io/${{ steps.repo.outputs.name }}:.*|image: ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}|" apps/todo-api/base/deployment.yaml

      - name: Update image tag in Helm values
        run: |
          sed -i "s|^  tag: .*|  tag: ${{ github.sha }}|" apps/todo-api-helm/values.yaml

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add apps/todo-api/base/deployment.yaml apps/todo-api-helm/values.yaml
          git diff --staged --quiet || git commit -m "chore: deploy ${{ github.sha }}"
          git push
